name: Release binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to attach binaries to (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: engraven-x86_64-linux
          - os: ubuntu-24.04-arm
            name: engraven-aarch64-linux
          - os: macos-latest
            name: engraven-x86_64-macos
            target: x86_64-apple-darwin
          - os: macos-latest
            name: engraven-aarch64-macos
          - os: windows-latest
            name: engraven-x86_64-windows.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}
      - name: Build
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --release --target "${{ matrix.target }}"
          else
            cargo build --release
          fi
      - name: Stage binary
        shell: bash
        run: |
          dir="target/release"
          if [ -n "${{ matrix.target }}" ]; then dir="target/${{ matrix.target }}/release"; fi
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$dir/engraven.exe" "${{ matrix.name }}"
          else
            cp "$dir/engraven" "${{ matrix.name }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  # a single publisher attaches every binary, so parallel jobs never race
  # to create the release
  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*
