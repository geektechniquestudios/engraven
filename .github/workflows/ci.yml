name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint-template:
    name: Template vault lints green
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # The shipped template must pass its own linter (placeholders are
      # expected pre-bootstrap, hence the flag).
      - run: node scripts/vault-check.mjs --vault template/vault --strict --allow-placeholders
      - run: bash scripts/validate-memory.sh --self-test

  rust:
    name: Rust CLI (fmt, clippy, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: hyphasma-linux-x86_64
          path: target/release/hyphasma

  parity:
    name: CLI and scripts cannot drift
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/download-artifact@v4
        with:
          name: hyphasma-linux-x86_64
          path: bin
      - run: chmod +x bin/hyphasma
      # Vault check: byte-identical stdout and exit code on the template vault.
      - run: |
          node scripts/vault-check.mjs --vault template/vault --strict --allow-placeholders > /tmp/vault-node.txt
          bin/hyphasma vault --vault template/vault --strict --allow-placeholders > /tmp/vault-rust.txt
          diff -u /tmp/vault-node.txt /tmp/vault-rust.txt
      # Memory check: verdict lines must match (paths and shell noise may differ).
      - run: |
          bash scripts/validate-memory.sh --self-test | grep -E "✓|⚠|✕|PASS|FAIL|self-test" > /tmp/mem-sh.txt
          bin/hyphasma memory --self-test | grep -E "✓|⚠|✕|PASS|FAIL|self-test" > /tmp/mem-rust.txt
          diff -u /tmp/mem-sh.txt /tmp/mem-rust.txt
