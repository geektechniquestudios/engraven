<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <title>Four lookup styles over one mechanism: drill-down through the three tiers, deep-link straight to a doc, cross-KB synthesis over a wiki-link, and episodic recall from the session archive.</title>
  <style>
    .m { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .lbl { fill: #e6edf3; font-size: 13px; font-weight: 700; letter-spacing: .08em; }
    .sub { fill: #8b949e; font-size: 10px; }
    .tiny { fill: #8b949e; font-size: 10px; }
    .cap { font-size: 12px; }
    .rbox { animation: breathe 36s infinite; }
    @keyframes breathe { 0%,100%{stroke-opacity:.55} 50%{stroke-opacity:1} }

    /* ── act 1 · drill-down (amber, 0-25%) ── */
    .q1 { animation: q1 36s infinite; } @keyframes q1 { 0%,0.8%{opacity:0} 2.2%,22%{opacity:1} 24%,100%{opacity:0} }
    .r1 { animation: r1 36s infinite; } @keyframes r1 { 0%,2%{opacity:0} 3.2%,21.5%{opacity:1} 23.5%,100%{opacity:0} }
    .x1 { animation: x1 36s infinite; } @keyframes x1 { 0%,2%{fill:#8b949e} 3.2%,21.5%{fill:#fbbf24} 23.5%,100%{fill:#8b949e} }
    .p1a { stroke-dasharray:100; animation: p1a 36s infinite; }
    @keyframes p1a { 0%,3.5%{stroke-dashoffset:100;opacity:1} 6%{stroke-dashoffset:0} 21%{stroke-dashoffset:0;opacity:1} 23%,100%{stroke-dashoffset:0;opacity:0} }
    .p2a { stroke-dasharray:100; animation: p2a 36s infinite; }
    @keyframes p2a { 0%,6%{stroke-dashoffset:100;opacity:1} 8%{stroke-dashoffset:0} 21%{stroke-dashoffset:0;opacity:1} 23%,100%{stroke-dashoffset:0;opacity:0} }
    .p3a { stroke-dasharray:100; animation: p3a 36s infinite; }
    @keyframes p3a { 0%,8%{stroke-dashoffset:100;opacity:1} 10%{stroke-dashoffset:0} 21%{stroke-dashoffset:0;opacity:1} 23%,100%{stroke-dashoffset:0;opacity:0} }
    .m1 { animation: m1 36s infinite; } @keyframes m1 { 0%,5.5%{fill:#21262d;stroke:#30363d} 7%,21%{fill:#3b2410;stroke:#f97316} 23.5%,100%{fill:#21262d;stroke:#30363d} }
    .h1 { animation: h1 36s infinite; } @keyframes h1 { 0%,7.5%{fill:#21262d;stroke:#30363d} 9%,21%{fill:#3b2410;stroke:#f97316} 23.5%,100%{fill:#21262d;stroke:#30363d} }
    .t1 { animation: t1 36s infinite; } @keyframes t1 { 0%,9.5%{fill:#21262d;stroke:#30363d} 11%,21%{fill:#fbbf24;stroke:#fbbf24} 23.5%,100%{fill:#21262d;stroke:#30363d} }
    .p4a { stroke-dasharray:100; animation: p4a 36s infinite; }
    @keyframes p4a { 0%,11%{stroke-dashoffset:100;opacity:1} 13%{stroke-dashoffset:0} 21%{stroke-dashoffset:0;opacity:1} 23%,100%{stroke-dashoffset:0;opacity:0} }
    .t1b { animation: t1b 36s infinite; } @keyframes t1b { 0%,12.5%{fill:#21262d;stroke:#30363d} 14%,21%{fill:#fbbf24;stroke:#fbbf24} 23.5%,100%{fill:#21262d;stroke:#30363d} }
    .a1 { animation: a1 36s infinite; } @keyframes a1 { 0%,14%{opacity:0} 15.5%,22.5%{opacity:1} 24.5%,100%{opacity:0} }
    .cap1 { animation: cap1 36s infinite; } @keyframes cap1 { 0%,1.2%{opacity:0} 2.6%,22.5%{opacity:1} 24.5%,100%{opacity:0} }

    /* ── act 2 · deep link (cyan, 25-50%) ── */
    .q2 { animation: q2 36s infinite; } @keyframes q2 { 0%,25.8%{opacity:0} 27.2%,47%{opacity:1} 49%,100%{opacity:0} }
    .r2 { animation: r2 36s infinite; } @keyframes r2 { 0%,27%{opacity:0} 28.2%,46.5%{opacity:1} 48.5%,100%{opacity:0} }
    .x2 { animation: x2 36s infinite; } @keyframes x2 { 0%,27%{fill:#8b949e} 28.2%,46.5%{fill:#67e8f9} 48.5%,100%{fill:#8b949e} }
    .p1b { stroke-dasharray:100; animation: p1b 36s infinite; }
    @keyframes p1b { 0%,28.5%{stroke-dashoffset:100;opacity:1} 32%{stroke-dashoffset:0} 46%{stroke-dashoffset:0;opacity:1} 48%,100%{stroke-dashoffset:0;opacity:0} }
    .t2 { animation: t2 36s infinite; } @keyframes t2 { 0%,31.5%{fill:#21262d;stroke:#30363d} 33%,46%{fill:#67e8f9;stroke:#67e8f9} 48.5%,100%{fill:#21262d;stroke:#30363d} }
    .a2 { animation: a2 36s infinite; } @keyframes a2 { 0%,33.5%{opacity:0} 35%,47.5%{opacity:1} 49.5%,100%{opacity:0} }
    .cap2 { animation: cap2 36s infinite; } @keyframes cap2 { 0%,26.2%{opacity:0} 27.6%,47.5%{opacity:1} 49.5%,100%{opacity:0} }

    /* ── act 3 · cross-KB synthesis (violet, 50-75%) ── */
    .q3 { animation: q3 36s infinite; } @keyframes q3 { 0%,50.8%{opacity:0} 52.2%,72%{opacity:1} 74%,100%{opacity:0} }
    .r3 { animation: r3 36s infinite; } @keyframes r3 { 0%,52%{opacity:0} 53.2%,71.5%{opacity:1} 73.5%,100%{opacity:0} }
    .x3 { animation: x3 36s infinite; } @keyframes x3 { 0%,52%{fill:#8b949e} 53.2%,71.5%{fill:#a78bfa} 73.5%,100%{fill:#8b949e} }
    .p1c { stroke-dasharray:100; animation: p1c 36s infinite; }
    @keyframes p1c { 0%,53.5%{stroke-dashoffset:100;opacity:1} 56.5%{stroke-dashoffset:0} 71%{stroke-dashoffset:0;opacity:1} 73%,100%{stroke-dashoffset:0;opacity:0} }
    .t3a { animation: t3a 36s infinite; } @keyframes t3a { 0%,56%{fill:#21262d;stroke:#30363d} 57.5%,71%{fill:#a78bfa;stroke:#a78bfa} 73.5%,100%{fill:#21262d;stroke:#30363d} }
    .p2c { stroke-dasharray:100; animation: p2c 36s infinite; }
    @keyframes p2c { 0%,57.5%{stroke-dashoffset:100;opacity:1} 60.5%{stroke-dashoffset:0} 71%{stroke-dashoffset:0;opacity:1} 73%,100%{stroke-dashoffset:0;opacity:0} }
    .t3b { animation: t3b 36s infinite; } @keyframes t3b { 0%,60%{fill:#21262d;stroke:#30363d} 61.5%,71%{fill:#a78bfa;stroke:#a78bfa} 73.5%,100%{fill:#21262d;stroke:#30363d} }
    .a3 { animation: a3 36s infinite; } @keyframes a3 { 0%,62%{opacity:0} 63.5%,72.5%{opacity:1} 74.5%,100%{opacity:0} }
    .cap3 { animation: cap3 36s infinite; } @keyframes cap3 { 0%,51.2%{opacity:0} 52.6%,72.5%{opacity:1} 74.5%,100%{opacity:0} }

    /* ── act 4 · episodic (green, 75-100%) ── */
    .q4 { animation: q4 36s infinite; } @keyframes q4 { 0%,75.8%{opacity:0} 77.2%,97%{opacity:1} 99%,100%{opacity:0} }
    .r4 { animation: r4 36s infinite; } @keyframes r4 { 0%,77%{opacity:0} 78.2%,96.5%{opacity:1} 98.5%,100%{opacity:0} }
    .x4 { animation: x4 36s infinite; } @keyframes x4 { 0%,77%{fill:#8b949e} 78.2%,96.5%{fill:#3fb950} 98.5%,100%{fill:#8b949e} }
    .p1d { stroke-dasharray:100; animation: p1d 36s infinite; }
    @keyframes p1d { 0%,78.5%{stroke-dashoffset:100;opacity:1} 82%{stroke-dashoffset:0} 96%{stroke-dashoffset:0;opacity:1} 98%,100%{stroke-dashoffset:0;opacity:0} }
    .t4 { animation: t4 36s infinite; } @keyframes t4 { 0%,81.5%{fill:#16211b;stroke:#2b4534} 83%,96%{fill:#1c3a26;stroke:#3fb950} 98.5%,100%{fill:#16211b;stroke:#2b4534} }
    .tx4 { animation: tx4 36s infinite; } @keyframes tx4 { 0%,81.5%{fill:#8b949e} 83%,96%{fill:#3fb950} 98.5%,100%{fill:#8b949e} }
    .a4 { animation: a4 36s infinite; } @keyframes a4 { 0%,83.5%{opacity:0} 85%,97.5%{opacity:1} 99.5%,100%{opacity:0} }
    .cap4 { animation: cap4 36s infinite; } @keyframes cap4 { 0%,76.2%{opacity:0} 77.6%,97.5%{opacity:1} 99.5%,100%{opacity:0} }
  </style>

  <rect x="0.5" y="0.5" width="879" height="439" rx="12" fill="#0d1117" stroke="#30363d"/>

  <!-- ══ query chips (top left, one per act) ══ -->
  <g class="q1"><rect x="48" y="18" width="314" height="30" rx="15" fill="#2a1c08" stroke="#fbbf24"/>
    <text class="m" x="64" y="37" font-size="12" fill="#fbbf24">"how many namespaces are in dev-east?"</text></g>
  <g class="q2"><rect x="48" y="18" width="226" height="30" rx="15" fill="#0b2733" stroke="#67e8f9"/>
    <text class="m" x="64" y="37" font-size="12" fill="#67e8f9">"how do we name API errors?"</text></g>
  <g class="q3"><rect x="48" y="18" width="248" height="30" rx="15" fill="#1d1530" stroke="#a78bfa"/>
    <text class="m" x="64" y="37" font-size="12" fill="#a78bfa">"restart pods during a freeze?"</text></g>
  <g class="q4"><rect x="48" y="18" width="226" height="30" rx="15" fill="#122117" stroke="#3fb950"/>
    <text class="m" x="64" y="37" font-size="12" fill="#3fb950">"didn't we try this before?"</text></g>

  <!-- ══ answer chips (top right, one per act) ══ -->
  <g class="a1"><rect x="512" y="18" width="320" height="30" rx="15" fill="#3b2410" stroke="#fbbf24"/>
    <text class="m" x="672" y="37" font-size="12" fill="#fbbf24" text-anchor="middle">→ aws sso login → ssm tunnel → kubectl ✓</text></g>
  <g class="a2"><rect x="574" y="18" width="258" height="30" rx="15" fill="#0b2733" stroke="#67e8f9"/>
    <text class="m" x="703" y="37" font-size="12" fill="#67e8f9" text-anchor="middle">→ [[Error Taxonomy]] · 1 hop ✓</text></g>
  <g class="a3"><rect x="482" y="18" width="350" height="30" rx="15" fill="#1d1530" stroke="#a78bfa"/>
    <text class="m" x="657" y="37" font-size="12" fill="#a78bfa" text-anchor="middle">→ [[Pod Restarts]] ⇄ [[Deploy Freeze]] ✓</text></g>
  <g class="a4"><rect x="550" y="18" width="282" height="30" rx="15" fill="#122117" stroke="#3fb950"/>
    <text class="m" x="691" y="37" font-size="12" fill="#3fb950" text-anchor="middle">→ session 11-02 · queue retries ✓</text></g>

  <!-- ══ ROUTER ══ -->
  <text class="lbl" x="48" y="86">ROUTER</text>
  <text class="sub m" x="112" y="86">MEMORY.md · always loaded · ≤200 lines</text>
  <rect class="rbox" x="48" y="96" width="280" height="190" rx="8" fill="#161b22" stroke="#a78bfa"/>

  <!-- row highlight pills -->
  <rect class="r1" x="56" y="134" width="264" height="24" rx="6" fill="#fbbf24" fill-opacity=".16" stroke="#fbbf24" opacity="0"/>
  <rect class="r2" x="56" y="190" width="264" height="24" rx="6" fill="#67e8f9" fill-opacity=".16" stroke="#67e8f9" opacity="0"/>
  <rect class="r3" x="56" y="106" width="264" height="24" rx="6" fill="#a78bfa" fill-opacity=".16" stroke="#a78bfa" opacity="0"/>
  <rect class="r4" x="56" y="246" width="264" height="24" rx="6" fill="#3fb950" fill-opacity=".16" stroke="#3fb950" opacity="0"/>

  <!-- rows: 4 real triggers + 2 skeletons -->
  <g font-size="10.5">
    <circle cx="68" cy="118" r="2.5" fill="#8b949e"/><text class="m x3" x="80" y="122" fill="#8b949e">pods × deploy freeze</text>
    <circle cx="68" cy="146" r="2.5" fill="#8b949e"/><text class="m x1" x="80" y="150" fill="#8b949e">dev-east · aws auth + ssm tunnel</text>
    <g fill="#30363d"><circle cx="68" cy="174" r="2.5" fill="#8b949e"/><rect x="80" y="171" width="104" height="6" rx="3"/><rect x="194" y="171" width="82" height="6" rx="3" fill="#262c36"/></g>
    <circle cx="68" cy="202" r="2.5" fill="#8b949e"/><text class="m x2" x="80" y="206" fill="#8b949e">error naming · conventions</text>
    <g fill="#30363d"><circle cx="68" cy="230" r="2.5" fill="#8b949e"/><rect x="80" y="227" width="88" height="6" rx="3"/><rect x="178" y="227" width="98" height="6" rx="3" fill="#262c36"/></g>
    <circle cx="68" cy="258" r="2.5" fill="#8b949e"/><text class="m x4" x="80" y="262" fill="#8b949e">tried before? → archive</text>
  </g>
  <text class="tiny m" x="48" y="302">trigger tables: “encounter X → read Y”</text>

  <!-- ══ VAULT ══ -->
  <text class="lbl" x="350" y="86">VAULT</text>
  <text class="sub m" x="404" y="86">docs/vault/ · read on demand · grows unbounded</text>
  <rect x="350" y="96" width="482" height="210" rx="8" fill="#161b22" stroke="#30363d"/>

  <text class="tiny m" x="366" y="114" fill="#6e7681">KB · infrastructure</text>
  <text class="tiny m" x="620" y="114" fill="#6e7681">KB · operations</text>

  <!-- static tree edges -->
  <g stroke="#262c36" stroke-width="1" fill="none">
    <path d="M 455 146 L 407 176"/><path d="M 455 146 L 507 176"/>
    <path d="M 712 146 L 657 176"/><path d="M 712 146 L 757 176"/>
    <path d="M 407 198 L 376 228 M 407 198 L 406 228 M 407 198 L 436 228"/>
    <path d="M 507 198 L 476 228 M 507 198 L 506 228 M 507 198 L 536 228"/>
    <path d="M 657 198 L 626 228 M 657 198 L 656 228 M 657 198 L 686 228"/>
    <path d="M 757 198 L 726 228 M 757 198 L 756 228 M 757 198 L 786 228"/>
  </g>

  <!-- static cross-links: the web on top of the tree -->
  <g stroke="#3a424d" stroke-width="1" fill="none" stroke-dasharray="3 3" opacity=".8">
    <path d="M 436 246 C 500 282, 600 282, 656 246"/>
    <path d="M 506 246 C 560 278, 672 278, 726 246"/>
    <path d="M 542 184 C 588 152, 612 142, 655 136"/>
    <path d="M 376 246 C 420 268, 492 268, 536 246"/>
    <path d="M 686 246 C 706 264, 766 264, 786 246"/>
    <path d="M 656 246 C 648 290, 620 318, 588 334"/>
  </g>

  <!-- tier 1: meta-analyses -->
  <rect class="m1" x="400" y="122" width="110" height="24" rx="6" fill="#21262d" stroke="#30363d"/>
  <text class="tiny m" x="455" y="138" text-anchor="middle" fill="#e6edf3">meta-analysis</text>
  <rect x="657" y="122" width="110" height="24" rx="6" fill="#21262d" stroke="#30363d"/>
  <text class="tiny m" x="712" y="138" text-anchor="middle" fill="#e6edf3">meta-analysis</text>

  <!-- tier 2: hubs -->
  <rect x="372" y="176" width="70" height="22" rx="6" fill="#21262d" stroke="#30363d"/>
  <rect class="h1" x="472" y="176" width="70" height="22" rx="6" fill="#21262d" stroke="#30363d"/>
  <rect x="622" y="176" width="70" height="22" rx="6" fill="#21262d" stroke="#30363d"/>
  <rect x="722" y="176" width="70" height="22" rx="6" fill="#21262d" stroke="#30363d"/>
  <text class="tiny m" x="407" y="191" text-anchor="middle">hub</text>
  <text class="tiny m" x="507" y="191" text-anchor="middle">hub</text>
  <text class="tiny m" x="657" y="191" text-anchor="middle">hub</text>
  <text class="tiny m" x="757" y="191" text-anchor="middle">hub</text>

  <!-- tier 3: docs -->
  <g fill="#21262d" stroke="#30363d">
    <rect class="t3a" x="424" y="228" width="24" height="18" rx="4"/>
    <rect x="364" y="228" width="24" height="18" rx="4"/><rect x="394" y="228" width="24" height="18" rx="4"/>
    <rect class="t1" x="464" y="228" width="24" height="18" rx="4"/><rect class="t1b" x="494" y="228" width="24" height="18" rx="4"/><rect x="524" y="228" width="24" height="18" rx="4"/>
    <rect x="614" y="228" width="24" height="18" rx="4"/><rect class="t3b" x="644" y="228" width="24" height="18" rx="4"/><rect x="674" y="228" width="24" height="18" rx="4"/>
    <rect x="714" y="228" width="24" height="18" rx="4"/><rect class="t2" x="744" y="228" width="24" height="18" rx="4"/><rect x="774" y="228" width="24" height="18" rx="4"/>
  </g>

  <text class="tiny m" x="591" y="270" text-anchor="middle">docs · deep content · leads with the answer</text>
  <text class="tiny m" x="591" y="292" text-anchor="middle" fill="#6e7681">three tiers down, wiki-links across: a graph, not a tree</text>

  <!-- ══ SESSION ARCHIVE ══ -->
  <rect x="350" y="322" width="482" height="52" rx="10" fill="#101613" stroke="#2b4534"/>
  <text class="m" x="366" y="352" font-size="10" fill="#3fb950" font-weight="700" letter-spacing=".08em">SESSION ARCHIVE</text>
  <g font-size="10">
    <rect x="474" y="334" width="108" height="28" rx="6" fill="#16211b" stroke="#2b4534"/>
    <text class="m" x="528" y="352" text-anchor="middle" fill="#8b949e">09-14 v2 plan</text>
    <rect x="592" y="334" width="108" height="28" rx="6" fill="#16211b" stroke="#2b4534"/>
    <text class="m" x="646" y="352" text-anchor="middle" fill="#8b949e">10-02 rate cap</text>
    <rect class="t4" x="710" y="334" width="108" height="28" rx="6" fill="#16211b" stroke="#2b4534"/>
    <text class="m tx4" x="764" y="352" text-anchor="middle" fill="#8b949e">11-02 retries</text>
  </g>

  <!-- ══ routed paths ══ -->
  <g fill="none" stroke-width="1.8">
    <path class="p1a" pathLength="100" d="M 328 146 C 358 146, 368 138, 398 138" stroke="#fbbf24"/>
    <path class="p2a" pathLength="100" d="M 455 146 L 507 176" stroke="#fbbf24"/>
    <path class="p3a" pathLength="100" d="M 507 198 L 476 228" stroke="#fbbf24"/>
    <path class="p4a" pathLength="100" d="M 476 249 C 484 261, 498 261, 506 249" stroke="#fbbf24"/>
    <path class="p1b" pathLength="100" d="M 328 202 C 460 202, 640 262, 742 237" stroke="#67e8f9"/>
    <path class="p1c" pathLength="100" d="M 328 118 C 372 118, 402 196, 433 225" stroke="#a78bfa"/>
    <path class="p2c" pathLength="100" d="M 436 246 C 500 282, 600 282, 656 246" stroke="#a78bfa" stroke-width="2"/>
    <path class="p1d" pathLength="100" d="M 328 258 C 390 300, 480 348, 708 348" stroke="#3fb950"/>
  </g>

  <!-- ══ cycling captions ══ -->
  <g class="cap">
    <text class="m cap1" x="48" y="414" fill="#fbbf24" opacity="0">① drill-down · it never asks "what's dev-east?" · the row already routes: auth → tunnel → query</text>
    <text class="m cap2" x="48" y="414" fill="#67e8f9" opacity="0">② deep link · a trigger row can point straight at any doc: one hop</text>
    <text class="m cap3" x="48" y="414" fill="#a78bfa" opacity="0">③ synthesis · a wiki-link bridges two KBs mid-read</text>
    <text class="m cap4" x="48" y="414" fill="#3fb950" opacity="0">④ episodic · the session archive keeps what was tried, and why</text>
  </g>
</svg>
