<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
  <title>One session's memory economics: instructions and the router load at session start, about five thousand tokens. A task arrives, a router row matches, and exactly one doc crosses from the vault into the context window. Counters show 6.4k loaded of roughly three million known, with about 194k of the window left free for the actual task.</title>
  <style>
    .A { animation-duration: 16s; animation-iteration-count: infinite; animation-fill-mode: backwards; }
    .b1 { animation-name: b1; } .b2 { animation-name: b2; }
    @keyframes b1 { 0%,4%{opacity:0;transform:translateX(-14px)} 8%{opacity:1;transform:translateX(0)} 92%{opacity:1} 96%,100%{opacity:0} }
    @keyframes b2 { 0%,9%{opacity:0;transform:translateX(-14px)} 13%{opacity:1;transform:translateX(0)} 92%{opacity:1} 96%,100%{opacity:0} }
    .free { animation-name: free; } @keyframes free { 0%,13%{opacity:0} 16%{opacity:1} 92%{opacity:1} 96%,100%{opacity:0} }
    .c5 { animation-name: c5; } @keyframes c5 { 0%,14%{opacity:0} 16%{opacity:1} 45%{opacity:1} 48%,100%{opacity:0} }
    .c6 { animation-name: c6; } @keyframes c6 { 0%,46%{opacity:0} 49%{opacity:1} 92%{opacity:1} 96%,100%{opacity:0} }
    .tk { animation-name: tk; } @keyframes tk { 0%,18%{opacity:0;transform:translateY(-8px)} 21%{opacity:1;transform:translateY(0)} 92%{opacity:1} 96%,100%{opacity:0} }
    .row { animation-name: row; } @keyframes row { 0%,24%{fill:#6e7681} 26%,88%{fill:#fbbf24} 92%,100%{fill:#6e7681} }
    .rowbox { animation-name: rowbox; } @keyframes rowbox { 0%,24%{stroke:transparent} 26%,88%{stroke:#4a3a20} 92%,100%{stroke:transparent} }
    .ping { stroke-dasharray:100; animation-name: ping; }
    @keyframes ping { 0%,27%{stroke-dashoffset:100;opacity:0} 28%{opacity:.9} 33%{stroke-dashoffset:0;opacity:.9} 44%{stroke-dashoffset:0;opacity:.5} 50%,100%{stroke-dashoffset:0;opacity:0} }
    .tsq { animation-name: tsq; } @keyframes tsq { 0%,30%{fill:#161d26} 32%,44%{fill:#fbbf24} 48%,88%{fill:#7c2d12} 94%,100%{fill:#161d26} }
    .fly { animation-name: fly; animation-timing-function: cubic-bezier(.45,0,.25,1); } @keyframes fly { 0%,36%{opacity:0;transform:translate(0,0)} 37%{opacity:1} 44%{opacity:1;transform:translate(-521px,58px)} 46%,100%{opacity:0;transform:translate(-521px,58px)} }
    .b3 { animation-name: b3; transform-box: fill-box; transform-origin: top; } @keyframes b3 { 0%,43%{opacity:0;transform:scaleY(0)} 44%{opacity:1} 48%{opacity:1;transform:scaleY(1)} 92%{opacity:1;transform:scaleY(1)} 96%,100%{opacity:0;transform:scaleY(1)} }
    .v0 { animation-name: v0; } @keyframes v0 { 0%{opacity:1} 45%{opacity:1} 48%,100%{opacity:0} }
    .v1 { animation-name: v1; } @keyframes v1 { 0%,46%{opacity:0} 49%{opacity:1} 92%{opacity:1} 96%,100%{opacity:0} }
    .pl { animation-name: pl; } @keyframes pl { 0%,52%{opacity:0} 56%{opacity:1} 93%{opacity:1} 97%,100%{opacity:0} }
  </style>

  <rect x="0.5" y="0.5" width="879" height="469" rx="12" fill="#0d1117" stroke="#30363d"/>

  <!-- the task that starts it all -->
  <g class="A tk">
    <rect x="310" y="8" width="260" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
    <text x="440" y="25" font-size="11.5" fill="#e6edf3" text-anchor="middle">task: "why is checkout failing?"</text>
  </g>

  <!-- left: the context window -->
  <text x="48" y="49" font-size="11" fill="#8b949e" letter-spacing=".08em">CONTEXT WINDOW</text>
  <text x="168" y="49" font-size="10.5" fill="#4d5566">· what the agent carries</text>
  <rect x="48" y="56" width="360" height="330" rx="10" fill="#10151c" stroke="#30363d"/>

  <g class="A b1">
    <rect x="64" y="72" width="328" height="34" rx="7" fill="#0b2733" stroke="#2a4a55"/>
    <text x="76" y="93" font-size="11.5" fill="#67e8f9">CLAUDE.md · rules</text>
    <text x="380" y="93" font-size="10.5" fill="#67e8f9" text-anchor="end">≈2k</text>
  </g>
  <g class="A b2">
    <rect x="64" y="114" width="328" height="48" rx="7" fill="#1d1530" stroke="#4c3a75"/>
    <text x="76" y="132" font-size="11.5" fill="#a78bfa">MEMORY.md router (≤200 lines)</text>
    <text x="380" y="132" font-size="10.5" fill="#a78bfa" text-anchor="end">≈3k</text>
    <rect class="A rowbox" x="72" y="139" width="312" height="17" rx="4" fill="none" stroke="transparent"/>
    <text class="A row" x="80" y="152" font-size="10.5" fill="#6e7681">payments → read [[Dunning and Retries]]</text>
  </g>
  <g class="A b3">
    <rect x="64" y="170" width="328" height="26" rx="7" fill="#2a1f10" stroke="#4a3a20"/>
    <text x="76" y="187" font-size="11.5" fill="#fbbf24">Dunning and Retries.md</text>
    <text x="380" y="187" font-size="10.5" fill="#fbbf24" text-anchor="end">+1.4k</text>
  </g>

  <text class="A free" x="228" y="300" font-size="11" fill="#4d5566" text-anchor="middle">~194k free for the actual task</text>
  <text class="A c5" x="392" y="372" font-size="11.5" fill="#8b949e" text-anchor="end">5.0k tok loaded</text>
  <text class="A c6" x="392" y="372" font-size="11.5" fill="#fbbf24" text-anchor="end">6.4k tok loaded</text>

  <!-- right: everything it knows -->
  <text x="460" y="49" font-size="11" fill="#8b949e" letter-spacing=".08em">EVERYTHING IT KNOWS</text>
  <text x="616" y="49" font-size="10.5" fill="#4d5566">· what it can reach</text>
  <rect x="460" y="56" width="372" height="330" rx="10" fill="#10151c" stroke="#30363d"/>

  <text x="476" y="84" font-size="11" fill="#8b949e">vault · docs/vault/</text>
  <g fill="#161d26">
    <rect x="476" y="94" width="9" height="9" rx="2"/><rect x="489" y="94" width="9" height="9" rx="2"/><rect x="502" y="94" width="9" height="9" rx="2"/><rect x="515" y="94" width="9" height="9" rx="2"/><rect x="528" y="94" width="9" height="9" rx="2"/><rect x="541" y="94" width="9" height="9" rx="2"/><rect x="554" y="94" width="9" height="9" rx="2"/><rect x="567" y="94" width="9" height="9" rx="2"/><rect x="580" y="94" width="9" height="9" rx="2"/><rect x="593" y="94" width="9" height="9" rx="2"/><rect x="606" y="94" width="9" height="9" rx="2"/><rect x="619" y="94" width="9" height="9" rx="2"/><rect x="632" y="94" width="9" height="9" rx="2"/><rect x="645" y="94" width="9" height="9" rx="2"/><rect x="658" y="94" width="9" height="9" rx="2"/><rect x="671" y="94" width="9" height="9" rx="2"/><rect x="684" y="94" width="9" height="9" rx="2"/><rect x="697" y="94" width="9" height="9" rx="2"/><rect x="710" y="94" width="9" height="9" rx="2"/><rect x="723" y="94" width="9" height="9" rx="2"/><rect x="736" y="94" width="9" height="9" rx="2"/><rect x="749" y="94" width="9" height="9" rx="2"/><rect x="762" y="94" width="9" height="9" rx="2"/><rect x="775" y="94" width="9" height="9" rx="2"/>
