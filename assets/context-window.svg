    <rect x="476" y="146" width="9" height="9" rx="2"/><rect x="489" y="146" width="9" height="9" rx="2"/><rect x="502" y="146" width="9" height="9" rx="2"/><rect x="515" y="146" width="9" height="9" rx="2"/><rect x="528" y="146" width="9" height="9" rx="2"/><rect x="541" y="146" width="9" height="9" rx="2"/><rect x="554" y="146" width="9" height="9" rx="2"/><rect x="567" y="146" width="9" height="9" rx="2"/><rect x="580" y="146" width="9" height="9" rx="2"/><rect x="593" y="146" width="9" height="9" rx="2"/><rect x="606" y="146" width="9" height="9" rx="2"/><rect x="619" y="146" width="9" height="9" rx="2"/><rect x="632" y="146" width="9" height="9" rx="2"/><rect x="645" y="146" width="9" height="9" rx="2"/><rect x="658" y="146" width="9" height="9" rx="2"/><rect x="671" y="146" width="9" height="9" rx="2"/><rect x="684" y="146" width="9" height="9" rx="2"/><rect x="697" y="146" width="9" height="9" rx="2"/><rect x="710" y="146" width="9" height="9" rx="2"/><rect x="723" y="146" width="9" height="9" rx="2"/><rect x="736" y="146" width="9" height="9" rx="2"/><rect x="749" y="146" width="9" height="9" rx="2"/><rect x="762" y="146" width="9" height="9" rx="2"/><rect x="775" y="146" width="9" height="9" rx="2"/>
