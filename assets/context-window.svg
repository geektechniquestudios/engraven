  <rect class="A tsq" x="593" y="120" width="9" height="9" rx="2" fill="#161d26"/>
  <text class="A v0" x="476" y="201" font-size="10.5" fill="#6e7681">3,800 docs · ~2.1M tok · 0 loaded</text>
  <text class="A v1" x="476" y="201" font-size="10.5" fill="#6e7681">3,800 docs · ~2.1M tok · <tspan fill="#fbbf24">1 loaded</tspan></text>

  <rect x="476" y="220" width="308" height="42" rx="8" fill="#0f1712" stroke="#2b4534"/>
  <text x="490" y="238" font-size="11" fill="#3fb950">session archive</text>
  <text x="490" y="253" font-size="10" fill="#6e7681">214 sessions · decisions and the why · ≈0 loaded</text>

  <text x="476" y="292" font-size="11" fill="#4d5566">everything on this side costs 0 tokens</text>
  <text x="476" y="308" font-size="11" fill="#4d5566">until a router row routes into it</text>

  <!-- the routed read: row match pings the vault, one doc crosses over -->
  <path class="A ping" pathLength="100" d="M 394 147 C 445 150, 550 142, 592 130" fill="none" stroke="#fbbf24" stroke-width="1.4"/>
  <rect class="A fly" x="593" y="120" width="9" height="9" rx="2" fill="#fbbf24"/>

  <!-- punchline -->
  <text class="A pl" x="440" y="424" font-size="12" fill="#8b949e" text-anchor="middle">loaded this session: <tspan fill="#fbbf24">6.4k</tspan> of ~3.0M known (0.2%) · chosen by rows, not similarity</text>
  <text x="440" y="450" font-size="11" fill="#6e7681" text-anchor="middle">memory can grow without bound; the per-session tax stays flat</text>
</svg>
