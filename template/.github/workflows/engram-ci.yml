# Engram memory integrity in CI — copied into your repo by the bootstrap.
# The vault is repo-shared, so it lints on every PR. Harness-local memory
# (the router + topic files) lives outside the repo; validate-memory.sh
# skips cleanly on runners and is run locally / by the agent instead.
name: Memory Integrity

on:
  pull_request:
    paths:
      - "docs/vault/**"
      - "engram.config.json"
      - "scripts/vault-check.mjs"
  push:
    branches: [main]
    paths:
      - "docs/vault/**"

jobs:
  vault-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/vault-check.mjs --strict
